services:
  llm-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: llm-service-test
    container_name: llm-tests
    volumes:
      - ./tests:/app/tests
    environment:
      - BASE_URL=http://llm-service:8000
    command: >
      python tests/eval_models.py
      --base-url http://llm-service:8000
    networks:
      llm_net:
        aliases:
          - llm-tests
    profiles:
      - test

  llm-quality-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: llm-service-test
    container_name: llm-quality-tests
    volumes:
      - ./tests:/app/tests
    environment:
      - BASE_URL=http://llm-service:8000
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - JUDGE_MODEL=${JUDGE_MODEL:-gpt-oss:120b}
    command: >
      python tests/test_llm_quality.py
      --base-url http://llm-service:8000
    networks:
      llm_net:
        aliases:
          - llm-quality-tests
    profiles:
      - test-quality

  llm-multi-turn-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: llm-service-test
    container_name: llm-multi-turn-tests
    volumes:
      - ./tests:/app/tests
    environment:
      - BASE_URL=http://llm-service:8000
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - JUDGE_MODEL=${JUDGE_MODEL:-gpt-oss:120b}
    command: >
      python tests/test_multi_turn.py
      --base-url http://llm-service:8000
    networks:
      llm_net:
        aliases:
          - llm-multi-turn-tests
    profiles:
      - test-multi-turn

networks:
  llm_net:
    name: personal-finance-llm-service_default
    external: true
