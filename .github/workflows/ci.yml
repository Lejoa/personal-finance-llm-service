name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Python lint with ruff
        uses: astral-sh/ruff-action@v3
        with:
          src: app/
      -
        name: Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0

  build-and-health-check:
    name: Build and health check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: llm-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      -
        name: Start container
        run: |
          docker run -d --name llm-ci -p 8000:8000 \
            -e LLM_PROVIDER=openai \
            -e LLM_MODEL=gpt-4o-mini \
            -e LLM_TEMPERATURE=0.3 \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e GUARDRAILS_API_KEY=${{ secrets.GUARDRAILS_API_KEY }} \
            llm-service:ci
      -
        name: Wait for service to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && exit 0
            echo "Attempt $i/30 — waiting..."
            sleep 3
          done
          echo "Service did not become healthy in time"
          docker logs llm-ci
          exit 1
      -
        name: Health check
        run: curl -f http://localhost:8000/health
