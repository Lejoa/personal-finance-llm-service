services:
  llm-service:
    build:
      context: .
      secrets:
        - guardrails_token
    image: llm-service
    container_name: llm-service
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    networks:
      - default
      - finance-network
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

networks:
  finance-network:
    name: finance-network
    driver: bridge

secrets:
  guardrails_token:
    environment: GUARDRAILS_API_KEY
