services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    environment:
      - OLLAMA_NUM_PARALLEL=1
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  llm-service:
    build:
      context: .
      args:
        GUARDRAILS_API_KEY: ${GUARDRAILS_API_KEY}
    image: llm-service
    container_name: llm-service
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    environment:
      - LLM_MODEL=${LLM_MODEL:-gpt-oss:120b-cloud}
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - default
      - finance-network
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  ollama_data:
    driver: local

networks:
  finance-network:
    name: finance-network
    driver: bridge
